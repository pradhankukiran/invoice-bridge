<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="InvoiceBridge logo">
  <title>InvoiceBridge</title>

  <!-- Background shield (sharp corners, solid enterprise navy) -->
  <rect width="240" height="240" fill="#0A2540"/>

  <!-- Gold double frame -->
  <rect x="10" y="10" width="220" height="220" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
  <rect x="15" y="15" width="210" height="210" fill="none" stroke="#D4AF37" stroke-width="0.75"/>

  <!-- Bridge silhouette — three masonry arches spanning the crest -->
  <g stroke="#D4AF37" stroke-width="2" fill="none">
    <path d="M 36 66 Q 60 42 84 66"/>
    <path d="M 84 66 Q 120 32 156 66"/>
    <path d="M 156 66 Q 180 42 204 66"/>
  </g>
  <line x1="30" y1="66" x2="210" y2="66" stroke="#D4AF37" stroke-width="2.5"/>

  <!-- Bridge pillars -->
  <rect x="34" y="66" width="4" height="6" fill="#D4AF37"/>
  <rect x="82" y="66" width="4" height="6" fill="#D4AF37"/>
  <rect x="118" y="66" width="4" height="6" fill="#D4AF37"/>
  <rect x="154" y="66" width="4" height="6" fill="#D4AF37"/>
  <rect x="202" y="66" width="4" height="6" fill="#D4AF37"/>

  <!-- IB monogram (serif, heavy) -->
  <text x="120" y="160"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', Times, serif"
        font-weight="700"
        font-size="78"
        fill="#FFFFFF"
        letter-spacing="-2">IB</text>

  <!-- Decorative divider under the monogram -->
  <line x1="48" y1="176" x2="108" y2="176" stroke="#D4AF37" stroke-width="0.75"/>
  <circle cx="120" cy="176" r="1.8" fill="#D4AF37"/>
  <line x1="132" y1="176" x2="192" y2="176" stroke="#D4AF37" stroke-width="0.75"/>

  <!-- Wordmark -->
  <text x="120" y="197"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="12"
        fill="#D4AF37"
        letter-spacing="4">INVOICEBRIDGE</text>

  <!-- Established date in roman numerals -->
  <text x="120" y="216"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="400"
        font-size="7"
        fill="#D4AF37"
        letter-spacing="3">EST · MMXXVI</text>
</svg>
